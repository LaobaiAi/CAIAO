name: CAIAO Knowledge Base
version: "1.0"
last_updated: "2026-06-04"
description: >
  CAIAO 知识体系的完整文档索引。覆盖 CAIAO 概念定义、两种实现路径（MCP SDK 与轻量）、
  Server 清单与设计模式、caiao.yaml 声明式系统、开发指南、Iron-Fall 迁移参考、
  协议规范、演进历史、批判反思、操作手册及附录资料。面向架构决策者、开发者及入门读者。

framework:
  mcp_sdk:
    path: ../caiao
    description: MCP SDK 完整实现，pip-installable 包
    entry: hub.py (CAIAOClientHub), discovery.py (清单发现)
  lightweight:
    path: ../caiao_lightweight
    description: 零依赖轻量实现，三个文件复制即用
    files: [server.py, hub.py, subprocess.py]

structure:
  - slug: core-concepts
    dir: 01-core-concepts
    display_zh: 核心概念
  - slug: two-implementations
    dir: 02-two-implementations
    display_zh: 两种实现路径
  - slug: server-catalog
    dir: 03-server-catalog
    display_zh: Server 清单与模式
  - slug: caiao-yaml-system
    dir: 04-caiao-yaml-system
    display_zh: caiao.yaml 声明式系统
  - slug: dev-guides
    dir: 05-dev-guides
    display_zh: 开发指南
  - slug: iron-fall-reference
    dir: 06-iron-fall-reference
    display_zh: Iron-Fall 迁移参考
  - slug: protocol-reference
    dir: 07-protocol-reference
    display_zh: 协议与契约参考
  - slug: evolution-history
    dir: 08-evolution-history
    display_zh: 演进历史
  - slug: critique-and-reflection
    dir: 09-critique-and-reflection
    display_zh: 批判与反思
  - slug: operations-manual
    dir: 10-operations-manual
    display_zh: 操作手册
  - slug: appendix
    dir: appendix
    display_zh: 附录

